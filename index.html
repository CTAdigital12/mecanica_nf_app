<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dispace · plataforma de peças e notas (wireframe)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<!-- ============================================================
     SHELL do app. As telas ficam em js/screens/* e são montadas
     dentro de #screenWrap pelo js/app.js.
     ============================================================ -->
<div class="device" id="app" data-mode="mec">
  <span class="demo-flag">WIREFRAME</span>

  <!-- ===== SIDEBAR (desktop) ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="s-brand"><span class="logo">DP</span> Dispace</div>

    <div class="modeseg full" role="tablist">
      <button data-mode="mec"  onclick="setMode('mec')">Cliente</button>
      <button data-mode="disp" onclick="setMode('disp')">Dispace</button>
    </div>

    <!-- navegação: lado da Dispace (admin + comercial) -->
    <button class="s-item" data-mode-nav="disp" data-navfor="dispHome" onclick="nav('dispHome')"><span class="ic">📊</span> Painel</button>
    <button class="s-item s-emit" data-mode-nav="disp" data-navfor="dispRadar" onclick="nav('dispRadar')"><span class="ic">🛰️</span> Radar de vida útil <span class="s-badge badge-count">12</span></button>
    <button class="s-item" data-mode-nav="disp" data-navfor="dispProdutos" onclick="nav('dispProdutos')"><span class="ic">📦</span> Produtos (loja)</button>
    <button class="s-item" data-mode-nav="disp" data-navfor="dispPedidos" onclick="nav('dispPedidos')"><span class="ic">🧾</span> Pedidos <span class="s-badge badge-count">5</span></button>
    <button class="s-item" data-mode-nav="disp" data-navfor="dispClientes" onclick="nav('dispClientes')"><span class="ic">🧑‍🔧</span> Clientes</button>
    <button class="s-item" data-mode-nav="disp" data-navfor="dispMural" onclick="nav('dispMural')"><span class="ic">📣</span> Mural (publicar)</button>

    <!-- navegação: lado do mecânico (cliente Dispace) -->
    <button class="s-item" data-mode-nav="mec" data-navfor="home" onclick="nav('home')"><span class="ic">🏠</span> Início</button>
    <button class="s-item s-emit" data-mode-nav="mec" onclick="nav('emitirTipo')"><span class="ic">🧾</span> Emitir nota</button>
    <button class="s-item" data-mode-nav="mec" data-navfor="notas" onclick="nav('notas')"><span class="ic">📂</span> Minhas notas</button>
    <button class="s-item" data-mode-nav="mec" data-navfor="clientes" onclick="nav('clientes')"><span class="ic">👨‍🌾</span> Meus clientes</button>
    <button class="s-item" data-mode-nav="mec" data-navfor="loja" onclick="nav('loja')"><span class="ic">🛒</span> Loja Dispace</button>
    <button class="s-item" data-mode-nav="mec" data-navfor="mural" onclick="nav('mural')"><span class="ic">📣</span> Mural <span class="s-badge badge-count">2</span></button>

    <span class="s-spacer"></span>
    <div class="s-user" data-mode-nav="disp"><span class="av">💼</span><div><div class="nm">Ana · Comercial</div><div class="rl">Dispace · admin</div></div></div>
    <div class="s-user" data-mode-nav="mec"><span class="av">👷</span><div><div class="nm">Seu Zé</div><div class="rl">Cliente Dispace · MEI</div></div></div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">

    <header class="topbar" id="topbar">
      <button class="icon-btn back" id="backBtn" style="display:none" onclick="goBack()" aria-label="Voltar">‹</button>
      <div class="brand" id="brandBlock">
        <span class="logo">DP</span>
        <span>Dispace</span>
      </div>
      <span class="title" id="topTitle"></span>
      <span class="spacer"></span>
      <span class="mode-badge" data-mode-nav="disp">💼 comercial</span>
      <button class="icon-btn dot-badge" onclick="nav('notificacoes')" aria-label="Avisos">🔔</button>
    </header>

    <!-- barra de modo (mobile) -->
    <div class="modebar" id="modebar">
      <div class="modeseg" role="tablist">
        <button data-mode="mec"  onclick="setMode('mec')">Cliente</button>
        <button data-mode="disp" onclick="setMode('disp')">Dispace comercial</button>
      </div>
    </div>

    <!-- as telas são montadas aqui pelo app.js -->
    <div class="screen-wrap" id="screenWrap"></div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottomnav" id="bottomnav">
      <!-- mecânico (cliente) -->
      <button data-mode-nav="mec" data-navfor="home" class="active" onclick="nav('home')"><span class="ic">🏠</span> Início</button>
      <button data-mode-nav="mec" data-navfor="notas" onclick="nav('notas')"><span class="ic">📂</span> Notas</button>
      <div class="fab-slot" data-mode-nav="mec"><button class="fab" onclick="nav('emitirTipo')" aria-label="Emitir nota"><span class="ic">＋</span></button><span class="fab-label">Emitir</span></div>
      <button data-mode-nav="mec" data-navfor="loja" onclick="nav('loja')"><span class="ic">🛒</span> Loja</button>
      <button data-mode-nav="mec" data-navfor="mural" onclick="nav('mural')"><span class="ic">📣</span> Mural</button>
      <!-- Dispace (admin + comercial) -->
      <button data-mode-nav="disp" data-navfor="dispHome" onclick="nav('dispHome')"><span class="ic">📊</span> Painel</button>
      <button data-mode-nav="disp" data-navfor="dispRadar" onclick="nav('dispRadar')"><span class="ic">🛰️</span> Radar</button>
      <button data-mode-nav="disp" data-navfor="dispProdutos" onclick="nav('dispProdutos')"><span class="ic">📦</span> Produtos</button>
      <button data-mode-nav="disp" data-navfor="dispPedidos" onclick="nav('dispPedidos')"><span class="ic">🧾</span> Pedidos</button>
      <button data-mode-nav="disp" data-navfor="dispClientes" onclick="nav('dispClientes')"><span class="ic">🧑‍🔧</span> Clientes</button>
    </nav>

  </div><!-- /main -->
</div>

<!-- ordem importa: registro → dados → telas → app -->
<script src="js/registry.js"></script>
<script src="js/data.js"></script>
<script src="js/screens/login.js"></script>
<script src="js/screens/home.js"></script>
<script src="js/screens/emitir.js"></script>
<script src="js/screens/notas.js"></script>
<script src="js/screens/clientes.js"></script>
<script src="js/screens/loja.js"></script>
<script src="js/screens/mural.js"></script>
<script src="js/screens/disp/painel.js"></script>
<script src="js/screens/disp/radar.js"></script>
<script src="js/screens/disp/produtos.js"></script>
<script src="js/screens/disp/pedidos.js"></script>
<script src="js/screens/disp/clientes.js"></script>
<script src="js/screens/disp/mural.js"></script>
<script src="js/app.js"></script>
</body>
</html>
